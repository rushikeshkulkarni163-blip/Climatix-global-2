<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password · Climactix Global</title>
  <link rel="icon" type="image/png" href="Climatix_logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#000000;--bg1:#0F0F0F;--bg2:#1A1A1A;
      --bd:#2C2C2C;--bd2:#333333;
      --tx:#FFFFFF;--tx2:#888888;--tx3:#555555;
      --amb:#0EA5E9;--amb-dim:#0284C7;
      --grn:#00CC44;--red:#FF3333;
      --font:'Inter',system-ui,sans-serif;
      --mono:'IBM Plex Mono',monospace;
    }
    html,body{height:100%;-webkit-font-smoothing:antialiased}
    body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}

    .auth-top{text-align:center;margin-bottom:32px}
    .auth-top-logo{display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;margin-bottom:8px}
    .auth-top-logo img{height:28px;width:auto;filter:brightness(0) invert(1)}
    .auth-top-name{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--tx);letter-spacing:.08em;text-transform:uppercase}
    .auth-top-tag{font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:.10em;text-transform:uppercase;margin-top:4px}

    .auth-card{
      background:var(--bg1);border:1px solid var(--bd);border-radius:3px;
      padding:36px 40px;width:100%;max-width:400px;
    }

    .auth-eyebrow{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--amb);letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px}
    .auth-title{font-size:22px;font-weight:800;color:var(--tx);margin-bottom:6px;letter-spacing:-.025em}
    .auth-sub{font-size:12px;color:var(--tx2);margin-bottom:28px;line-height:1.65}

    .field{margin-bottom:18px}
    .field label{
      display:block;font-family:var(--mono);font-size:10px;font-weight:700;
      color:var(--tx2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;
    }
    .field input{
      width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:2px;
      font-size:13px;font-family:var(--font);color:var(--tx);
      background:var(--bg);outline:none;transition:border-color .15s,background .15s;
    }
    .field input::placeholder{color:var(--tx3)}
    .field input:focus{border-color:var(--amb);background:var(--bg2)}

    .btn-primary{
      width:100%;padding:10px 20px;background:var(--amb);color:#000;border:none;
      border-radius:2px;font-family:var(--mono);font-size:11px;font-weight:700;
      letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .15s;
    }
    .btn-primary:hover:not(:disabled){background:var(--amb-dim)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed}

    .alert{border-radius:2px;padding:9px 12px;font-size:12px;font-weight:500;margin-bottom:16px;display:none;line-height:1.5}
    .alert.error{background:rgba(255,51,51,0.08);color:#FF6666;border:1px solid rgba(255,51,51,0.20);border-left:3px solid #FF3333}
    .alert.success{background:rgba(0,204,68,0.08);color:#33CC66;border:1px solid rgba(0,204,68,0.20);border-left:3px solid #00CC44}
    .alert.show{display:block}

    .reset-link-box{
      background:rgba(0,204,68,0.06);border:1px solid rgba(0,204,68,0.20);border-left:3px solid var(--grn);
      border-radius:2px;padding:14px;margin-top:14px;display:none;word-break:break-all;
    }
    .reset-link-box p{font-family:var(--mono);font-size:10px;font-weight:700;color:#33CC66;margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em}
    .reset-link-box a{font-size:12px;color:var(--amb);text-decoration:none}
    .reset-link-box a:hover{text-decoration:underline}

    .back-link{
      display:block;text-align:center;margin-top:20px;
      font-family:var(--mono);font-size:10px;color:var(--tx3);text-decoration:none;
      letter-spacing:.06em;transition:color .15s;
    }
    .back-link:hover{color:var(--tx2)}

    .spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin .65s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="auth-top">
    <a href="index.html" class="auth-top-logo">
      <img src="Climatix_logo.png" alt="Climactix Global" />
      <span class="auth-top-name">Climactix Global</span>
    </a>
    <div class="auth-top-tag">ESG Intelligence Platform</div>
  </div>

  <div class="auth-card">
    <div class="auth-eyebrow">Password Recovery</div>
    <h1 class="auth-title">Forgot password?</h1>
    <p class="auth-sub">Enter your email and we'll generate a secure reset link for you instantly.</p>
    <div class="alert error"   id="errorAlert"></div>
    <div class="alert success" id="successAlert"></div>
    <form id="forgotForm" novalidate>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required />
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">Get Reset Link →</button>
    </form>
    <div class="reset-link-box" id="resetLinkBox">
      <p>Reset link ready</p>
      <a id="resetLinkHref" href="#">Click here to reset your password →</a>
    </div>
    <a href="login.html" class="back-link">← Back to sign in</a>
  </div>

  <script type="module">
    import { forgotPassword } from './auth.js';

    function showError(msg) { const e = document.getElementById('errorAlert'); e.textContent = msg; e.classList.add('show'); }
    function showSuccess(msg) { const e = document.getElementById('successAlert'); e.textContent = msg; e.classList.add('show'); document.getElementById('errorAlert').classList.remove('show'); }
    function setLoading(on) {
      const btn = document.getElementById('submitBtn');
      btn.disabled = on;
      btn.innerHTML = on ? '<span class="spinner"></span>Generating…' : 'Get Reset Link →';
    }

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) { showError('Please enter your email address.'); return; }
      setLoading(true);
      try {
        const result = await forgotPassword(email);
        if (result.token) {
          const url = `reset-password.html?email=${encodeURIComponent(result.email)}&token=${result.token}`;
          const box = document.getElementById('resetLinkBox');
          const link = document.getElementById('resetLinkHref');
          link.href = url;
          box.style.display = 'block';
          showSuccess('Reset link generated below. Click it to set a new password.');
        } else {
          showSuccess('If that email is registered, a reset link has been generated.');
        }
        document.getElementById('forgotForm').style.opacity = '0.4';
        document.getElementById('forgotForm').style.pointerEvents = 'none';
      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
