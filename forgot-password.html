<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password · Climactix Global</title>
  <link rel="icon" type="image/png" href="Climatix_logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --primary: #0B3D2E; --primary-hover: #0d4f3a; --text: #0F172A; --muted: #64748B; --border: #E2E8F0; --bg: #F0F4F2; --card: #ffffff; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .auth-top { text-align: center; margin-bottom: 32px; }
    .auth-top img { height: 220px; width: auto; }
    .auth-top p { color: var(--muted); font-size: 12px; letter-spacing: 1.2px; text-transform: uppercase; margin-top: 10px; font-weight: 500; }
    .auth-card { background: var(--card); border-radius: 20px; padding: 44px 48px; width: 100%; max-width: 420px; box-shadow: 0 4px 32px rgba(11,61,46,0.10); border: 1px solid rgba(11,61,46,0.06); animation: fadeUp .4s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .auth-title { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .auth-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 7px; }
    .field input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: 'Inter', sans-serif; color: var(--text); background: #FAFAFA; outline: none; transition: border-color .2s, box-shadow .2s; }
    .field input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(11,61,46,0.08); }
    .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: background .2s, box-shadow .2s; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); box-shadow: 0 4px 16px rgba(11,61,46,0.25); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert { border-radius: 10px; padding: 12px 16px; font-size: 13px; font-weight: 500; margin-bottom: 20px; display: none; }
    .alert.error   { background: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }
    .alert.success { background: #F0FDF4; color: #15803D; border: 1px solid #BBF7D0; }
    .alert.show { display: block; }
    .reset-link-box { background: #F0FDF4; border: 1px solid #BBF7D0; border-radius: 12px; padding: 16px; margin-top: 16px; display: none; word-break: break-all; }
    .reset-link-box p { font-size: 13px; color: #15803D; margin-bottom: 8px; font-weight: 600; }
    .reset-link-box a { font-size: 13px; color: #0B3D2E; }
    .back-link { display: block; text-align: center; margin-top: 24px; font-size: 13px; color: var(--muted); text-decoration: none; }
    .back-link:hover { color: var(--primary); }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="auth-top">
    <a href="index.html"><img src="Climatix_logo.png" alt="Climactix Global" /></a>
    <p>ESG Intelligence Platform</p>
  </div>
  <div class="auth-card">
    <h1 class="auth-title">Forgot password?</h1>
    <p class="auth-sub">Enter your email and we'll generate a secure reset link for you instantly.</p>
    <div class="alert error"   id="errorAlert"></div>
    <div class="alert success" id="successAlert"></div>
    <form id="forgotForm" novalidate>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required />
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">Get Reset Link →</button>
    </form>
    <!-- Shows the reset link inline (since no email server) -->
    <div class="reset-link-box" id="resetLinkBox">
      <p>Your password reset link:</p>
      <a id="resetLinkHref" href="#">Click here to reset your password →</a>
    </div>
    <a href="login.html" class="back-link">← Back to sign in</a>
  </div>

  <script type="module">
    import { forgotPassword } from './auth.js';

    function showError(msg) { const e = document.getElementById('errorAlert'); e.textContent = msg; e.classList.add('show'); }
    function showSuccess(msg) { const e = document.getElementById('successAlert'); e.textContent = msg; e.classList.add('show'); document.getElementById('errorAlert').classList.remove('show'); }
    function setLoading(on) {
      const btn = document.getElementById('submitBtn');
      btn.disabled = on;
      btn.innerHTML = on ? '<span class="spinner"></span>Generating…' : 'Get Reset Link →';
    }

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) { showError('Please enter your email address.'); return; }

      setLoading(true);
      try {
        const result = await forgotPassword(email);
        if (result.token) {
          const url = `reset-password.html?email=${encodeURIComponent(result.email)}&token=${result.token}`;
          const box = document.getElementById('resetLinkBox');
          const link = document.getElementById('resetLinkHref');
          link.href = url;
          box.style.display = 'block';
          showSuccess('Reset link generated below. Click it to set a new password.');
        } else {
          showSuccess('If that email is registered, a reset link has been generated.');
        }
        document.getElementById('forgotForm').style.opacity = '0.4';
        document.getElementById('forgotForm').style.pointerEvents = 'none';
      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
