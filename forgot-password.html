<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password · Climactix Global</title>
  <link rel="icon" type="image/png" href="Climatix_logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --primary: #0B3D2E; --primary-hover: #0d4f3a; --text: #0F172A; --muted: #64748B; --border: #E2E8F0; --bg: #F0F4F2; --card: #ffffff; --error: #EF4444; --success: #22C55E; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

    .auth-top { text-align: center; margin-bottom: 32px; }
    .auth-top img { height: 52px; width: auto; }
    .auth-top p { color: var(--muted); font-size: 12px; letter-spacing: 1.2px; text-transform: uppercase; margin-top: 10px; font-weight: 500; }

    .auth-card { background: var(--card); border-radius: 20px; padding: 44px 48px; width: 100%; max-width: 420px; box-shadow: 0 4px 32px rgba(11,61,46,0.10); border: 1px solid rgba(11,61,46,0.06); animation: fadeUp .4s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    .auth-title { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .auth-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }

    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 7px; }
    .field input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: 'Inter', sans-serif; color: var(--text); background: #FAFAFA; outline: none; transition: border-color .2s, box-shadow .2s, background .2s; }
    .field input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(11,61,46,0.08); }

    .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: background .2s, box-shadow .2s; }
    .btn-primary:hover { background: var(--primary-hover); box-shadow: 0 4px 16px rgba(11,61,46,0.25); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; box-shadow: none; }

    .alert { border-radius: 10px; padding: 12px 16px; font-size: 13px; font-weight: 500; margin-bottom: 20px; display: none; }
    .alert.error { background: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }
    .alert.success { background: #F0FDF4; color: #15803D; border: 1px solid #BBF7D0; }
    .alert.show { display: block; }

    .back-link { display: block; text-align: center; margin-top: 24px; font-size: 13px; color: var(--muted); text-decoration: none; }
    .back-link:hover { color: var(--primary); }
    .back-link span { margin-right: 4px; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="auth-top">
    <a href="index.html"><img src="Climatix_logo.png" alt="Climactix Global" /></a>
    <p>ESG Intelligence Platform</p>
  </div>

  <div class="auth-card">
    <h1 class="auth-title">Forgot password?</h1>
    <p class="auth-sub">No worries. Enter your email and we'll send a secure reset link within minutes.</p>

    <div class="alert error" id="errorAlert"></div>
    <div class="alert success" id="successAlert"></div>

    <form id="forgotForm" novalidate>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required />
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">Send Reset Link →</button>
    </form>

    <a href="login.html" class="back-link"><span>←</span> Back to sign in</a>
  </div>

  <script>
    const API = 'http://localhost:3001/api/auth';

    function showError(msg) {
      const el = document.getElementById('errorAlert');
      el.textContent = msg; el.classList.add('show');
      document.getElementById('successAlert').classList.remove('show');
    }
    function showSuccess(msg) {
      const el = document.getElementById('successAlert');
      el.textContent = msg; el.classList.add('show');
      document.getElementById('errorAlert').classList.remove('show');
    }
    function setLoading(loading) {
      const btn = document.getElementById('submitBtn');
      btn.disabled = loading;
      btn.innerHTML = loading ? '<span class="spinner"></span>Sending…' : 'Send Reset Link →';
    }

    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) { showError('Please enter your email address.'); return; }

      setLoading(true);
      try {
        const res = await fetch(`${API}/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (!res.ok) { showError(data.error || 'Something went wrong. Please try again.'); return; }
        showSuccess(data.message || 'Reset link sent! Check your email inbox.');
        document.getElementById('forgotForm').style.opacity = '0.5';
        document.getElementById('forgotForm').style.pointerEvents = 'none';
      } catch (err) {
        showError('Cannot connect to server. Make sure the auth server is running.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
