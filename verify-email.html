<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Verify Email · Climactix Global</title>
  <link rel="icon" type="image/png" href="Climatix_logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#000000;--bg1:#0F0F0F;--bg2:#1A1A1A;
      --bd:#2C2C2C;
      --tx:#FFFFFF;--tx2:#888888;--tx3:#555555;
      --amb:#0EA5E9;--amb-dim:#0284C7;
      --grn:#00CC44;--red:#FF3333;
      --font:'Roboto',system-ui,sans-serif;
      --mono:'IBM Plex Mono',monospace;
    }
    html,body{height:100%;-webkit-font-smoothing:antialiased}
    body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}

    .auth-top{text-align:center;margin-bottom:32px}
    .auth-top-logo{display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;margin-bottom:8px}
    .auth-top-logo img{height:28px;width:auto}
    .auth-top-name{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--tx);letter-spacing:.08em;text-transform:uppercase}
    .auth-top-tag{font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:.10em;text-transform:uppercase;margin-top:4px}

    .auth-card{
      background:var(--bg1);border:1px solid var(--bd);border-radius:3px;
      padding:48px 40px;width:100%;max-width:400px;text-align:center;
    }

    .ring{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--amb);border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 24px}
    @keyframes spin{to{transform:rotate(360deg)}}

    .s-icon{font-size:32px;margin-bottom:16px;display:block}
    .s-title{font-size:18px;font-weight: 700;color:var(--tx);margin-bottom:8px;letter-spacing:-.02em}
    .s-text{font-size:12px;color:var(--tx2);line-height:1.7;margin-bottom:24px}

    .btn{
      display:inline-block;padding:9px 20px;background:var(--amb);color:#000;
      border:none;border-radius:2px;font-family:var(--mono);font-size:11px;font-weight:700;
      letter-spacing:.08em;text-transform:uppercase;text-decoration:none;cursor:pointer;
      transition:background .15s;
    }
    .btn:hover{background:var(--amb-dim)}

    .link{
      display:block;margin-top:14px;font-family:var(--mono);font-size:10px;
      color:var(--tx3);text-decoration:none;letter-spacing:.06em;transition:color .15s;
    }
    .link:hover{color:var(--tx2)}
  </style>
</head>
<body>
  <div class="auth-top">
    <a href="index.html" class="auth-top-logo">
      <img src="Climatix_logo.png" alt="Climactix Global" />
      <span class="auth-top-name">Climactix Global</span>
    </a>
    <div class="auth-top-tag">ESG Intelligence Platform</div>
  </div>

  <div class="auth-card">
    <div id="stateLoading">
      <div class="ring"></div>
      <p class="s-title">Verifying…</p>
      <p class="s-text">Please wait while we confirm your email address.</p>
    </div>
    <div id="stateSuccess" style="display:none;">
      <span class="s-icon">✓</span>
      <p class="s-title">Email verified</p>
      <p class="s-text">Your account is active. Redirecting to the assessment…</p>
      <a href="assessment.html" class="btn">Start Assessment →</a>
    </div>
    <div id="stateError" style="display:none;">
      <span class="s-icon">⚠</span>
      <p class="s-title">Verification failed</p>
      <p class="s-text" id="errMsg">The link is invalid or expired.</p>
      <a href="signup.html" class="btn">Back to Sign Up</a>
      <a href="login.html" class="link">← Sign in</a>
    </div>
  </div>

  <script type="module">
    import { verifyEmail, getSession } from './auth.js?v=4';

    // Same guard as login.html: only skip this page for an already-verified
    // session, or an unverified one bounced here from login.html would just
    // redirect straight back to assessment.html and loop again.
    if (getSession()?.verified) { location.href = 'assessment.html'; }

    function show(id) {
      ['stateLoading','stateSuccess','stateError'].forEach(s =>
        document.getElementById(s).style.display = s === id ? 'block' : 'none'
      );
    }

    const params = new URLSearchParams(location.search);
    const email  = params.get('email');
    const token  = params.get('token');

    if (!email || !token) {
      show('stateError');
      document.getElementById('errMsg').textContent = 'No verification data found. Please use the link from your signup page.';
    } else {
      verifyEmail(email, token)
        .then(() => {
          show('stateSuccess');
          setTimeout(() => { location.href = 'assessment.html'; }, 2000);
        })
        .catch(err => {
          document.getElementById('errMsg').textContent = err.message || 'Verification failed.';
          show('stateError');
        });
    }
  </script>
  <!-- Card micro-interaction engine (hover lift/tilt, entrance reveal) -->
  <script src="card-motion.js" defer></script>
</body>
</html>
