<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email · Climactix Global</title>
  <link rel="icon" type="image/png" href="Climatix_logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --primary: #0B3D2E; --text: #0F172A; --muted: #64748B; --bg: #F0F4F2; --card: #ffffff; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .auth-top { text-align: center; margin-bottom: 32px; }
    .auth-top img { height: 52px; width: auto; }
    .auth-top p { color: var(--muted); font-size: 12px; letter-spacing: 1.2px; text-transform: uppercase; margin-top: 10px; font-weight: 500; }
    .auth-card { background: var(--card); border-radius: 20px; padding: 52px 48px; width: 100%; max-width: 420px; box-shadow: 0 4px 32px rgba(11,61,46,0.10); border: 1px solid rgba(11,61,46,0.06); text-align: center; animation: fadeUp .4s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .s-icon { font-size: 52px; margin-bottom: 16px; display: block; }
    .s-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .s-text { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }
    .ring { width: 52px; height: 52px; border: 4px solid rgba(11,61,46,0.12); border-top-color: var(--primary); border-radius: 50%; animation: spin .9s linear infinite; margin: 0 auto 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn { display: inline-block; padding: 13px 32px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; text-decoration: none; }
    .btn:hover { background: #0d4f3a; }
    .link { display: block; margin-top: 16px; font-size: 13px; color: var(--muted); text-decoration: none; }
    .link:hover { color: var(--primary); }
  </style>
</head>
<body>
  <div class="auth-top">
    <a href="index.html"><img src="Climatix_logo.png" alt="Climactix Global" /></a>
    <p>ESG Intelligence Platform</p>
  </div>
  <div class="auth-card">
    <div id="stateLoading"><div class="ring"></div><p class="s-title">Verifying…</p></div>
    <div id="stateSuccess" style="display:none;">
      <span class="s-icon">✅</span>
      <p class="s-title">Email verified!</p>
      <p class="s-text">Your account is active. Redirecting to the assessment…</p>
      <a href="assessment.html" class="btn">Start Assessment →</a>
    </div>
    <div id="stateError" style="display:none;">
      <span class="s-icon">❌</span>
      <p class="s-title">Verification failed</p>
      <p class="s-text" id="errMsg">The link is invalid or expired.</p>
      <a href="signup.html" class="btn">Back to Sign Up</a>
      <a href="login.html" class="link">← Sign in</a>
    </div>
  </div>

  <script type="module">
    import { verifyEmail, getSession } from './auth.js';

    // Already verified and logged in?
    if (getSession()) { location.href = 'assessment.html'; }

    function show(id) {
      ['stateLoading','stateSuccess','stateError'].forEach(s =>
        document.getElementById(s).style.display = s === id ? 'block' : 'none'
      );
    }

    const params = new URLSearchParams(location.search);
    const email  = params.get('email');
    const token  = params.get('token');

    if (!email || !token) {
      show('stateError');
      document.getElementById('errMsg').textContent = 'No verification data found. Please use the link from your signup page.';
    } else {
      verifyEmail(email, token)
        .then(() => {
          show('stateSuccess');
          setTimeout(() => { location.href = 'assessment.html'; }, 2000);
        })
        .catch(err => {
          document.getElementById('errMsg').textContent = err.message || 'Verification failed.';
          show('stateError');
        });
    }
  </script>
</body>
</html>
