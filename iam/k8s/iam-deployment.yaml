apiVersion: apps/v1
kind: Deployment
metadata:
  name: climactix-iam
  namespace: climactix
  labels:
    app: climactix-iam
    tier: backend
    component: auth
spec:
  replicas: 3
  selector:
    matchLabels:
      app: climactix-iam
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: climactix-iam
        tier: backend
        component: auth
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3100"
        prometheus.io/path: "/api/v1/metrics"
    spec:
      serviceAccountName: climactix-iam-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [climactix-iam]
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: climactix-iam
      containers:
        - name: iam
          image: climactix/iam-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3100
              protocol: TCP
          envFrom:
            - configMapRef:
                name: climactix-iam-config
            - secretRef:
                name: climactix-iam-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3100
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: climactix-iam
  namespace: climactix
  labels:
    app: climactix-iam
spec:
  selector:
    app: climactix-iam
  ports:
    - name: http
      port: 80
      targetPort: 3100
      protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: climactix-iam-hpa
  namespace: climactix
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: climactix-iam
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 3
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: climactix-iam-pdb
  namespace: climactix
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: climactix-iam
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: climactix-keycloak
  namespace: climactix
  labels:
    app: climactix-keycloak
    component: iam-provider
spec:
  replicas: 2
  selector:
    matchLabels:
      app: climactix-keycloak
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: climactix-keycloak
        component: iam-provider
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: [climactix-keycloak]
              topologyKey: kubernetes.io/hostname
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:23.0.7
          args: ["start", "--optimized"]
          ports:
            - name: http
              containerPort: 8080
            - name: jgroups
              containerPort: 7600
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://climactix-postgres-iam:5432/keycloak
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: climactix-iam-secrets
                  key: IAM_DB_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: climactix-iam-secrets
                  key: IAM_DB_PASSWORD
            - name: KC_HOSTNAME
              value: auth.climactix.global
            - name: KC_HOSTNAME_STRICT
              value: "true"
            - name: KC_HTTP_ENABLED
              value: "false"
            - name: KC_HTTPS_PORT
              value: "8443"
            - name: KC_PROXY
              value: edge
            - name: KC_CACHE
              value: ispn
            - name: KC_CACHE_STACK
              value: kubernetes
            - name: KC_CLUSTER_STACK
              value: kubernetes
            - name: JAVA_OPTS_APPEND
              value: "-Djgroups.dns.query=climactix-keycloak-headless.climactix.svc.cluster.local"
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: climactix-iam-secrets
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: climactix-iam-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: climactix-keycloak
  namespace: climactix
spec:
  selector:
    app: climactix-keycloak
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: climactix-keycloak-headless
  namespace: climactix
spec:
  clusterIP: None
  selector:
    app: climactix-keycloak
  ports:
    - name: jgroups
      port: 7600
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: climactix-iam-ingress
  namespace: climactix
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-burst-multiplier: "2"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.climactix.global
        - auth.climactix.global
      secretName: climactix-tls  # pragma: allowlist secret
  rules:
    - host: api.climactix.global
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: climactix-iam
                port:
                  number: 80
    - host: auth.climactix.global
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: climactix-keycloak
                port:
                  number: 80
