<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In · Climactix Global</title>
  <link rel="icon" type="image/png" href="Climatix_logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --primary: #0B3D2E; --primary-hover: #0d4f3a; --text: #0F172A; --muted: #64748B; --border: #E2E8F0; --bg: #F0F4F2; --card: #ffffff; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .auth-top { text-align: center; margin-bottom: 32px; }
    .auth-top img { height: 220px; width: auto; }
    .auth-top p { color: var(--muted); font-size: 12px; letter-spacing: 1.2px; text-transform: uppercase; margin-top: 10px; font-weight: 500; }
    .auth-card { background: var(--card); border-radius: 20px; padding: 44px 48px; width: 100%; max-width: 440px; box-shadow: 0 4px 32px rgba(11,61,46,0.10); border: 1px solid rgba(11,61,46,0.06); animation: fadeUp .4s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .auth-title { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .auth-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 7px; }
    .field input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: 'Inter', sans-serif; color: var(--text); background: #FAFAFA; outline: none; transition: border-color .2s, box-shadow .2s, background .2s; }
    .field input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(11,61,46,0.08); }
    .field-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
    .field-row label { margin-bottom: 0; }
    .field-row a { font-size: 12px; color: var(--primary); text-decoration: none; font-weight: 500; }
    .field-row a:hover { text-decoration: underline; }
    .remember-row { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .remember-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
    .remember-row label { font-size: 13px; color: var(--muted); cursor: pointer; }
    .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: background .2s, box-shadow .2s; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); box-shadow: 0 4px 16px rgba(11,61,46,0.25); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert { border-radius: 10px; padding: 12px 16px; font-size: 13px; font-weight: 500; margin-bottom: 20px; display: none; line-height: 1.5; }
    .alert.error   { background: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }
    .alert.success { background: #F0FDF4; color: #15803D; border: 1px solid #BBF7D0; }
    .alert.warning { background: #FFFBEB; color: #92400E; border: 1px solid #FDE68A; }
    .alert.show { display: block; }
    .auth-switch { text-align: center; margin-top: 28px; font-size: 13px; color: var(--muted); }
    .auth-switch a { color: var(--primary); font-weight: 600; text-decoration: none; }
    .auth-switch a:hover { text-decoration: underline; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer-links { text-align: center; margin-top: 32px; }
    .footer-links a { font-size: 12px; color: var(--muted); text-decoration: none; margin: 0 8px; }
    .footer-links a:hover { color: var(--primary); }
  </style>
</head>
<body>

  <div class="auth-top">
    <a href="index.html"><img src="Climatix_logo.png" alt="Climactix Global" /></a>
    <p>ESG Intelligence Platform</p>
  </div>

  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your Climactix Global account</p>

    <div class="alert error"   id="errorAlert"></div>
    <div class="alert success" id="successAlert"></div>
    <div class="alert warning" id="warningAlert"></div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required />
      </div>
      <div class="field">
        <div class="field-row">
          <label for="password">Password</label>
          <a href="forgot-password.html">Forgot password?</a>
        </div>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <div class="remember-row">
        <input type="checkbox" id="rememberMe" />
        <label for="rememberMe">Keep me signed in for 30 days</label>
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">Sign In →</button>
    </form>

    <div class="auth-switch">Don't have an account? <a href="signup.html">Create one free</a></div>
  </div>

  <div class="footer-links">
    <a href="index.html">← Back to site</a>
    <a href="assessment.html">Assessment</a>
  </div>

  <script type="module">
    import { signIn, getSession } from './auth.js';

    // Already logged in? Skip to assessment
    if (getSession()) {
      const redirect = new URLSearchParams(location.search).get('redirect') || 'assessment.html';
      location.href = redirect;
    }

    function showError(msg) {
      document.getElementById('errorAlert').innerHTML = msg;
      document.getElementById('errorAlert').classList.add('show');
      document.getElementById('successAlert').classList.remove('show');
      document.getElementById('warningAlert').classList.remove('show');
    }
    function showSuccess(msg) {
      document.getElementById('successAlert').textContent = msg;
      document.getElementById('successAlert').classList.add('show');
      document.getElementById('errorAlert').classList.remove('show');
    }
    function showWarning(msg) {
      document.getElementById('warningAlert').innerHTML = msg;
      document.getElementById('warningAlert').classList.add('show');
      document.getElementById('errorAlert').classList.remove('show');
    }
    function setLoading(on) {
      const btn = document.getElementById('submitBtn');
      btn.disabled = on;
      btn.innerHTML = on ? '<span class="spinner"></span>Signing in…' : 'Sign In →';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('errorAlert').classList.remove('show');
      document.getElementById('warningAlert').classList.remove('show');

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('rememberMe').checked;

      if (!email)    { showError('Please enter your email address.'); return; }
      if (!password) { showError('Please enter your password.'); return; }

      setLoading(true);
      try {
        await signIn({ email, password, remember });
        showSuccess('Signed in! Redirecting…');
        setTimeout(() => {
          const redirect = new URLSearchParams(location.search).get('redirect') || 'assessment.html';
          location.href = redirect;
        }, 600);
      } catch (err) {
        if (err.code === 'not-verified') {
          showWarning(`Your email isn't verified yet. <a href="verify-email.html?email=${encodeURIComponent(err.email)}&token=${err.token}" style="color:#0B3D2E;font-weight:600;">Click here to verify →</a>`);
        } else {
          showError(err.message || 'Sign in failed. Please try again.');
        }
      } finally {
        setLoading(false);
      }
    });

    // Allow Enter key
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('loginForm').requestSubmit();
    });
  </script>
</body>
</html>
