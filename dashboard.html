<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Climactix Dashboard — GreenGrid Industries</title>
  <meta name="description" content="Bloomberg-style climate intelligence dashboard. ESG performance, Climactix Score, emissions trends, and real-world impact." />
  <link rel="icon" type="image/png" href="Climatix_logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="site.css?v=4" />
  <script>(function(){var t=localStorage.getItem('cx-theme')||'dark';if(t==='light')document.documentElement.setAttribute('data-theme','light');})();</script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
  /* ════════════════════════════════════════════════════════════
     CLIMACTIX INTELLIGENCE DASHBOARD
     Bloomberg Terminal — Dark Navy / Blue Theme
  ════════════════════════════════════════════════════════════ */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
  /* ══ CLIMACTIX — Institutional Intelligence Terminal
     Bloomberg · Palantir · NASA · BlackRock Aladdin
     Matte. Flat. Precise. No glow theater.         */

  --bg0: #000000;
  --bg1: #0A0A0A;
  --bg2: #141414;
  --bg3: #1A1A1A;
  --bg4: #212121;
  --bghov: #0D0D0D;

  --bd0: rgba(255,255,255,0.05);
  --bd1: rgba(255,255,255,0.08);
  --bd2: rgba(255,255,255,0.13);
  --bd3: rgba(255,255,255,0.22);

  /* Dashboard variable aliases → institutional */
  --br:  rgba(255,255,255,0.06);
  --br2: rgba(255,255,255,0.10);
  --br3: rgba(255,255,255,0.18);

  --t1: #FFFFFF;
  --t2: rgba(255,255,255,0.52);
  --t3: rgba(255,255,255,0.30);

  /* Accent system — institutional steel blue */
  --g:  #3A8FA8;
  --g2: rgba(58,143,168,0.07);
  --g3: rgba(58,143,168,0.04);

  /* Secondary — muted amber (risk/warning) */
  --y:  #C26000;
  --y2: rgba(194,96,0,0.08);

  /* Semantic */
  --r:   #C9372C;
  --r2:  rgba(201,55,44,0.08);
  --b:   #3A8FA8;
  --b2:  rgba(58,143,168,0.07);
  --grn: #1A6E44;

  --rad:  1px;
  --mono: 'IBM Plex Mono', 'Courier New', monospace;
  --sans: 'Roboto', system-ui, sans-serif;
}

  /* Light theme for dashboard */
  [data-theme="light"] :root,
  [data-theme="light"] {
    --bg0:  #F5F5F5;
    --bg1:  #FFFFFF;
    --bg2:  #EEEEEE;
    --bg3:  #E5E5E5;
    --bg4:  #D9D9D9;
    --bghov: #EBEBEB;
    --br:   rgba(0,0,0,0.06);
    --br2:  rgba(0,0,0,0.12);
    --br3:  rgba(0,0,0,0.20);
    --t1:   #0A1020;
    --t2:   rgba(10,16,32,0.60);
    --t3:   rgba(10,16,32,0.36);
    --g:    #2A7A96;
    --grn:  #1A6E44;
    --y:    #9A5000;
    --r:    #A02820;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    background: var(--bg0);
    color: var(--t1);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    font-size: 12.5px;
    line-height: 1.5;
    overflow-x: hidden;
  }

  ::-webkit-scrollbar { width: 5px; background: var(--bg0); }
  ::-webkit-scrollbar-thumb { background: var(--br3); border-radius: 3px; }

  /* ── ANIMATIONS — minimal, no glow/pulse ────────────────── */
  @keyframes fadeUp  { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  /* ── LAYOUT ──────────────────────────────────────────────── */
  .dash { max-width: 1560px; margin: 0 auto; padding: 0 20px 60px; }

  /* ── TOP BAR ─────────────────────────────────────────────── */
  .topbar {
    height: 44px; background: var(--bg0);
    border-bottom: 1px solid var(--br);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; position: sticky; top: 0; z-index: 200;
  }
  .tb-left  { display: flex; align-items: center; gap: 12px; }
  .tb-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; }
  .tb-dot   { width: 6px; height: 6px; border-radius: 50%; background: var(--g); }
  .tb-name  { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--t1); letter-spacing: .06em; text-transform: uppercase; }
  .demo-badge {
    font-family: var(--mono); font-size: 8.5px; font-weight: 700;
    letter-spacing: .14em; text-transform: uppercase;
    background: var(--g2); border: 1px solid rgba(245,158,11,.3);
    color: var(--g); padding: 2px 8px; border-radius: 2px;
  }
  .tb-back {
    font-size: 11px; font-weight: 500; color: var(--t2);
    text-decoration: none; padding: 4px 10px;
    border: 1px solid var(--br2); border-radius: var(--rad);
    transition: all .15s ease;
  }
  .tb-back:hover { color: var(--g); border-color: var(--br3); }

  .tb-mid { display: flex; gap: 20px; align-items: center; }
  .tb-stat { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; color: var(--t2); }
  .tb-k { color: var(--t3); font-size: 9px; letter-spacing: .1em; text-transform: uppercase; }

  .tb-right { display: flex; align-items: center; gap: 12px; }
  .tb-clock { font-family: var(--mono); font-size: 11px; color: var(--t3); letter-spacing: .05em; }
  .tb-live {
    display: flex; align-items: center; gap: 5px;
    font-family: var(--mono); font-size: 10px; font-weight: 500; color: var(--grn);
    background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25);
    padding: 3px 10px; border-radius: 2px;
    letter-spacing: 0.08em;
  }
  .live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--grn); }

  /* ── COMPANY HEADER ──────────────────────────────────────── */
  .co-hd {
    display: grid; grid-template-columns: 1fr auto auto;
    align-items: center; gap: 24px;
    padding: 20px 0 16px; border-bottom: 1px solid var(--br);
    margin-bottom: 14px;
  }
  .co-name {
    font-size: 22px; font-weight: 700; letter-spacing: -.025em;
    margin-bottom: 5px; display: flex; align-items: center; gap: 10px;
  }
  .co-ticker {
    font-family: var(--mono); font-size: 10px; font-weight: 500;
    color: var(--t2); background: var(--bg3);
    border: 1px solid var(--br2); padding: 2px 8px; border-radius: 2px;
  }
  .co-meta { display: flex; align-items: center; gap: 10px; font-size: 11.5px; color: var(--t2); flex-wrap: wrap; }
  .sep { color: var(--t3); }

  /* Score */
  .hd-score {
    text-align: center; padding: 2px 32px;
    border-left: 1px solid var(--br); border-right: 1px solid var(--br);
  }
  .hd-sc-lbl { font-size: 9px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--t3); margin-bottom: 4px; }
  .hd-sc-num {
    font-family: var(--mono); font-size: 56px; font-weight: 700;
    color: var(--g); line-height: 1;
  }
  .hd-sc-den { font-family: var(--mono); font-size: 20px; color: var(--t3); font-weight: 400; }
  .hd-sc-meta { margin-top: 5px; display: flex; gap: 10px; align-items: center; justify-content: center; }
  .hd-grade { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--y); }
  .hd-delta { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--g); }
  .hd-pctile { font-size: 9.5px; color: var(--t3); margin-top: 3px; text-align: center; }

  /* View toggle */
  .vtog { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .vtog-lbl { font-size: 9px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--t3); }
  .vtog-btns { display: flex; background: var(--bg1); border: 1px solid var(--br2); border-radius: 3px; overflow: hidden; }
  .vbtn {
    font-family: var(--sans); font-size: 11.5px; font-weight: 500;
    padding: 8px 16px; border: none; cursor: pointer;
    background: transparent; color: var(--t2); transition: all .15s ease;
  }
  .vbtn.on { background: rgba(64,168,220,.12); color: var(--g); border-right: none; }
  .vbtn:hover:not(.on) { color: var(--t1); background: var(--bg3); }
  .vtog-note { font-size: 9.5px; color: var(--t3); text-align: right; max-width: 210px; line-height: 1.45; }

  /* ── KPI CARDS ───────────────────────────────────────────── */
  .kpi-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; margin-bottom: 14px; }
  .kpi {
    background: var(--bg1); border: 1px solid var(--br);
    border-radius: var(--rad); padding: 14px 16px;
    position: relative; overflow: hidden;
    transition: border-color .2s ease;
    animation: fadeUp .45s ease both;
  }
  .kpi::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .kpi.green::after { background: linear-gradient(90deg, var(--g), transparent); }
  .kpi.yellow::after { background: linear-gradient(90deg, var(--y), transparent); }
  .kpi.red::after    { background: linear-gradient(90deg, var(--r), transparent); }
  .kpi:hover { border-color: var(--br3); }
  .kpi:nth-child(1) { animation-delay: .05s; }
  .kpi:nth-child(2) { animation-delay: .10s; }
  .kpi:nth-child(3) { animation-delay: .15s; }
  .kpi:nth-child(4) { animation-delay: .20s; }
  .kpi:nth-child(5) { animation-delay: .25s; }

  .kpi-lbl { font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--t3); margin-bottom: 9px; }
  .kpi-val { font-family: var(--mono); font-size: 29px; font-weight: 700; line-height: 1; letter-spacing: -.02em; }
  .kpi.green .kpi-val { color: var(--g); }
  .kpi.yellow .kpi-val { color: var(--y); }
  .kpi.red .kpi-val   { color: var(--r); }
  .kpi-unit { font-family: var(--mono); font-size: 12px; color: var(--t2); font-weight: 400; margin-left: 2px; }
  .kpi-sub  { font-size: 9.5px; color: var(--t3); margin: 4px 0 8px; }
  .kpi-trend { display: flex; align-items: center; gap: 3px; font-family: var(--mono); font-size: 10.5px; font-weight: 500; }
  .kpi-trend.pos { color: var(--g); }
  .kpi-trend.neg { color: var(--r); }

  /* ── CARD BASE ───────────────────────────────────────────── */
  .card { background: var(--bg1); border: 1px solid var(--br); border-radius: var(--rad); padding: 18px 20px; animation: fadeUp .45s ease both; }
  .ctit {
    font-size: 9px; font-weight: 700; letter-spacing: .16em;
    text-transform: uppercase; color: var(--t3); margin-bottom: 16px;
    display: flex; align-items: center; gap: 7px;
  }
  .cdot { width: 4px; height: 4px; border-radius: 50%; background: var(--g); flex-shrink: 0; }

  /* ── MAIN GRID ───────────────────────────────────────────── */
  .main-grid { display: grid; grid-template-columns: 400px 1fr; gap: 12px; margin-bottom: 12px; }

  /* ── SCORE BREAKDOWN ─────────────────────────────────────── */
  .sbd-inner  { display: flex; gap: 18px; align-items: center; margin-bottom: 16px; }
  .dnt-wrap   { position: relative; width: 158px; height: 158px; flex-shrink: 0; }
  .dnt-over   { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  .dnt-num    { font-family: var(--mono); font-size: 38px; font-weight: 700; color: var(--g); line-height: 1; }
  .dnt-lbl    { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--t3); margin-top: 3px; }
  .esg-bars   { flex: 1; display: flex; flex-direction: column; gap: 13px; }
  .esg-bh     { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .esg-bn     { font-size: 10px; font-weight: 500; color: var(--t2); }
  .esg-bv     { font-family: var(--mono); font-size: 14px; font-weight: 700; }
  .esg-bd     { font-family: var(--mono); font-size: 9px; color: var(--t3); }
  .bar-t      { height: 5px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .bar-f      { height: 100%; border-radius: 2px; transition: width 1s ease; }
  .esg-bwt    { font-size: 9px; color: var(--t3); margin-top: 2px; }
  .cmp-strip  { display: flex; gap: 8px; }
  .cmp-box    { flex: 1; background: var(--bg2); border: 1px solid var(--br); border-radius: var(--rad); padding: 10px 12px; }
  .cmp-lbl    { font-size: 8.5px; text-transform: uppercase; letter-spacing: .1em; color: var(--t3); margin-bottom: 5px; }
  .cmp-val    { font-family: var(--mono); font-size: 18px; font-weight: 700; margin-bottom: 5px; }
  .cmp-bar    { height: 3px; background: var(--bg3); border-radius: 1px; overflow: hidden; }
  .cmp-bf     { height: 100%; border-radius: 1px; }

  /* ── IMPACT ──────────────────────────────────────────────── */
  .imp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .imp-box  {
    background: var(--bg2); border: 1px solid var(--br); border-radius: var(--rad);
    padding: 15px 16px; position: relative; overflow: hidden;
    transition: border-color .2s ease;
  }
  .imp-box:hover { border-color: var(--br3); }
  .imp-box::before { content: ''; position: absolute; bottom: -20px; right: -20px; width: 80px; height: 80px; border-radius: 50%; background: rgba(64,168,220,.03); }
  .imp-ico  { font-family: var(--mono); font-size: 18px; color: var(--g); opacity: .55; margin-bottom: 8px; line-height: 1; }
  .imp-val  { font-family: var(--mono); font-size: 24px; font-weight: 700; color: var(--g); line-height: 1; margin-bottom: 2px; }
  .imp-unit { font-family: var(--mono); font-size: 10.5px; color: var(--t2); margin-bottom: 3px; }
  .imp-lbl  { font-size: 9.5px; color: var(--t3); line-height: 1.45; }

  /* ── TREND CHARTS ────────────────────────────────────────── */
  .trend-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .ch-hd     { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .ch-big    { font-family: var(--mono); font-size: 26px; font-weight: 700; line-height: 1; }
  .ch-big-s  { font-size: 9px; color: var(--t3); text-transform: uppercase; letter-spacing: .1em; margin-top: 3px; }
  .ch-delta  { font-family: var(--mono); font-size: 12px; font-weight: 500; text-align: right; }
  .ch-range  { font-family: var(--mono); font-size: 10px; color: var(--t3); text-align: right; margin-top: 3px; }

  /* ── BOTTOM GRID ─────────────────────────────────────────── */
  .bot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

  /* ── INITIATIVES ─────────────────────────────────────────── */
  .init-hd, .init-row {
    display: grid; grid-template-columns: 1fr 86px 1fr 70px;
    gap: 12px; align-items: center;
  }
  .init-hd { padding: 6px 0 9px; border-bottom: 1px solid var(--br); }
  .init-row { padding: 10px 0; border-bottom: 1px solid var(--br); transition: background .1s; }
  .init-row:last-child { border-bottom: none; }
  .ih-cell  { font-size: 8.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--t3); }
  .init-name { font-size: 12px; font-weight: 500; color: var(--t1); margin-bottom: 2px; }
  .init-cov  { font-size: 9.5px; color: var(--t3); }
  .stag {
    font-size: 9px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 2px; display: inline-block;
  }
  .st-act { background: var(--g2); color: var(--g); border: 1px solid rgba(64,168,220,.22); }
  .st-ip  { background: var(--y2); color: var(--y); border: 1px solid rgba(245,158,11,.22); }
  .st-pl  { background: var(--b2); color: var(--b); border: 1px solid rgba(96,165,250,.2); }
  .init-imp { font-size: 10px; color: var(--t2); line-height: 1.45; }
  .sdg-pill {
    font-family: var(--mono); font-size: 8.5px; font-weight: 700;
    background: var(--g3); border: 1px solid rgba(64,168,220,.16);
    color: var(--g); padding: 1px 5px; border-radius: 2px; margin-right: 3px;
  }
  .prog-v   { font-family: var(--mono); font-size: 10px; color: var(--t2); margin-bottom: 4px; }
  .prog-t   { height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .prog-f   { height: 100%; background: var(--g); border-radius: 2px; transition: width 1s ease; }

  /* ── RISK CARDS ──────────────────────────────────────────── */
  .risk-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .rcard {
    border-radius: var(--rad); padding: 13px 15px;
    border: 1px solid var(--br); border-left: 3px solid;
    background: var(--bg2);
  }
  .rc-rh { border-left-color: var(--r); }
  .rc-rm { border-left-color: var(--y); }
  .rc-oh { border-left-color: var(--g); }
  .rc-om { border-left-color: var(--b); }
  .rbadge {
    font-size: 8.5px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; padding: 2px 7px; border-radius: 2px;
    display: inline-block; margin-bottom: 7px;
  }
  .rb-rh { background: var(--r2); color: var(--r); border: 1px solid rgba(248,113,113,.2); }
  .rb-rm { background: var(--y2); color: var(--y); border: 1px solid rgba(245,158,11,.2); }
  .rb-oh { background: var(--g2); color: var(--g); border: 1px solid rgba(64,168,220,.2); }
  .rb-om { background: var(--b2); color: var(--b); border: 1px solid rgba(96,165,250,.2); }
  .r-title  { font-size: 12px; font-weight: 500; color: var(--t1); margin-bottom: 5px; line-height: 1.3; }
  .r-desc   { font-size: 10.5px; color: var(--t2); line-height: 1.65; margin-bottom: 6px; }
  .r-action { font-size: 9.5px; color: var(--t3); font-style: italic; border-top: 1px solid var(--br); padding-top: 5px; }

  /* ── SDG CARDS ───────────────────────────────────────────── */
  .sdg-8g { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
  .sdg-card {
    background: var(--bg2); border: 1px solid var(--br);
    border-radius: var(--rad); padding: 12px 13px; border-top: 3px solid;
    transition: border-color .15s ease;
  }
  .sdg-n  { font-family: var(--mono); font-size: 20px; font-weight: 700; line-height: 1; margin-bottom: 2px; }
  .sdg-nm { font-size: 9.5px; color: var(--t3); line-height: 1.35; margin-bottom: 8px; }
  .sdg-sc { font-family: var(--mono); font-size: 17px; font-weight: 700; margin-bottom: 5px; }
  .sdg-bt { height: 3px; background: var(--bg3); border-radius: 1px; overflow: hidden; }
  .sdg-bf { height: 100%; border-radius: 1px; }

  /* ── COMPLIANCE LIST ─────────────────────────────────────── */
  .cplist { display: flex; flex-direction: column; }
  .cprow {
    display: grid; grid-template-columns: 110px 1fr 54px;
    gap: 14px; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--br);
  }
  .cprow:last-child { border-bottom: none; }
  .cp-fw  { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--t1); }
  .cp-de  { font-size: 10.5px; color: var(--t2); line-height: 1.5; }
  .cp-pct { font-family: var(--mono); font-size: 14px; font-weight: 700; text-align: right; }
  .cp-al  { color: var(--g); }
  .cp-pa  { color: var(--y); }

  /* ── FOOTER ──────────────────────────────────────────────── */
  .dash-foot {
    padding: 14px 0; border-top: 1px solid var(--br);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 9.5px; color: var(--t3); margin-top: 4px;
  }
  .foot-left { display: flex; align-items: center; gap: 10px; }
  .foot-brand { font-family: var(--mono); font-weight: 500; color: var(--g); }

  /* ── RESPONSIVE ──────────────────────────────────────────── */
  @media (max-width: 1200px) {
    .main-grid { grid-template-columns: 360px 1fr; }
  }
  @media (max-width: 1050px) {
    .co-hd   { grid-template-columns: 1fr auto; }
    .vtog    { display: none; }
    .main-grid { grid-template-columns: 1fr; }
    .kpi-row { grid-template-columns: repeat(3,1fr); }
  }
  @media (max-width: 820px) {
    .trend-row { grid-template-columns: 1fr; }
    .bot-grid  { grid-template-columns: 1fr; }
    .risk-2x2  { grid-template-columns: 1fr; }

function useClock() {
  const [t, setT] = useState(new Date());
  useEffect(() => {
    const id = setInterval(() => setT(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  return t.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

/* ════════════════════════════════════════════════════════════
   CHART COMPONENTS
════════════════════════════════════════════════════════════ */
function LineChart({ values, labels, color, unit }) {
  const cRef = useRef(null);
  const iRef = useRef(null);
  useEffect(() => {
    if (!cRef.current || !window.Chart) return;
    iRef.current?.destroy();
    const ctx = cRef.current.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 155);
    grad.addColorStop(0, color + '28');
    grad.addColorStop(1, color + '04');
    iRef.current = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: values,
          borderColor: color, borderWidth: 2,
          pointBackgroundColor: color,
          pointBorderColor: '#030508', pointBorderWidth: 2.5,
          pointRadius: 5, pointHoverRadius: 8,
          backgroundColor: grad, fill: true, tension: 0.35,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#070B12', borderColor: 'rgba(255,255,255,0.10)', borderWidth: 1,
            titleColor: '#F0F4F8', bodyColor: 'rgba(240,244,248,0.50)', padding: 10,
            displayColors: false,
            callbacks: { label: c => ` ${c.parsed.y.toLocaleString()}${unit}` }
          },
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,0.04)', tickLength: 0 }, border: { display: false },
            ticks: { color: 'rgba(240,244,248,0.28)', font: { family:"var(--mono)", size:10 }, padding:5 },
          },
          y: {
            grid: { color: 'rgba(255,255,255,0.04)', tickLength: 0 }, border: { display: false },
            ticks: { color: 'rgba(240,244,248,0.28)', font: { family:"var(--mono)", size:10 }, padding:7 },
          },
        },
      },
    });
    return () => { iRef.current?.destroy(); iRef.current = null; };
  }, []);
  return <div style={{height:160}}><canvas ref={cRef} /></div>;
}

function DonutChart({ score, e, s, g }) {
  const cRef = useRef(null);
  const iRef = useRef(null);
  useEffect(() => {
    if (!cRef.current || !window.Chart) return;

    setLiveStatus('loading');

      const res = await fetch(`${AI_API}/investor-summary`, { signal: AbortSignal.timeout(5000) });

      setLiveStatus('error');
      setTimeout(() => setLiveStatus('idle'), 4000);

      <div className="topbar">
        <div className="tb-left">
          <a href="index.html" className="tb-brand">
            <img src="Climatix_logo.png" alt="Climactix Global" style={{height:'32px',width:'auto',objectFit:'contain'}} />
          </a>
          <span className="demo-badge">DEMO</span>
          <a href="index.html" className="tb-back">← Platform</a>
        </div>

        <div className="tb-mid">
          <div className="tb-stat">
            <span className="tb-k">REPORTING</span>{D.co.fy}
          </div>
          <div className="tb-stat">
            <span className="tb-k">UPDATED</span>{D.co.updated}
          </div>
          <div className="tb-stat">
            <span className="tb-k">VERIFIED</span>
            <span style={{color:'var(--g)'}}> GHG Protocol Scope 1+2</span>
          </div>
          <div className="tb-stat">
            <span className="tb-k">SECTOR</span>{D.co.sub}
          </div>
        </div>

        <div className="tb-right">
          <span className="tb-clock">{clock}</span>
          {liveStatus === 'loaded'
            ? <span className="tb-live" style={{cursor:'pointer',background:'rgba(64,168,220,.12)',padding:'3px 10px',borderRadius:'4px'}} onClick={() => { setLiveData(null); setLiveStatus('idle'); }}>
                <span className="live-dot"/>AI LIVE · Reset
              </span>
            : liveStatus === 'loading'
            ? <span className="tb-live" style={{opacity:.6}}>⟳ Loading…</span>
            : liveStatus === 'error'
            ? <span style={{fontFamily:'var(--mono)',fontSize:'10px',color:'var(--r)',padding:'3px 10px'}}> No AI report yet</span>
            : <button onClick={loadLiveData} style={{
                fontFamily:'var(--mono)',fontSize:'9px',fontWeight:600,
                letterSpacing:'.08em',textTransform:'uppercase',
                background:'rgba(64,168,220,.12)',border:'1px solid rgba(64,168,220,.3)',
                color:'var(--g)',borderRadius:'4px',padding:'4px 10px',cursor:'pointer',
              }}> Load AI Data</button>
          }
          <span className="tb-live"><span className="live-dot"/>LIVE</span>
          <button
            onClick={() => {
              const h = document.documentElement;
              const t = h.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
              h.setAttribute('data-theme', t);
              localStorage.setItem('cx-theme', t);
            }}
            style={{
              width:'26px',height:'26px',border:'1px solid var(--br)',borderRadius:'2px',
              background:'none',cursor:'pointer',color:'var(--t3)',fontSize:'12px',
              display:'flex',alignItems:'center',justifyContent:'center'
            }}
            title="Toggle theme"
          >○</button>
        </div>
      </div>

      {/* ── MAIN CONTENT ── */}
      <div className="dash">

        {/* ── COMPANY HEADER ── */}
        <div className="co-hd">
          <div>
            <div className="co-name">
              {D.co.name}
              <span className="co-ticker">{D.co.ticker}</span>
            </div>
            {liveData?.investor_output?.investment_thesis && (
              <div style={{fontFamily:'var(--mono)',fontSize:'9px',color:'var(--g)',margin:'4px 0 6px',opacity:.8,maxWidth:'420px',lineHeight:1.4}}>
                 {liveData.investor_output.investment_thesis}
              </div>
            )}
            <div className="co-meta">
              <span>{D.co.sector}</span>
              <span className="sep">·</span>
              <span>{D.co.loc}</span>
              <span className="sep">·</span>
              <span>{D.co.emp} employees</span>
              <span className="sep">·</span>
              <span>Revenue {D.co.rev}</span>
            </div>
          </div>

          <div className="hd-score">
            <div className="hd-sc-lbl">{liveData ? 'AI ESG SCORE' : 'CLIMACTIX SCORE'}</div>
            <div style={{display:'flex',alignItems:'baseline',gap:6,justifyContent:'center'}}>
              <span className="hd-sc-num">{sc.total}</span>
              <span className="hd-sc-den">/100</span>
            </div>
            <div className="hd-sc-meta">
              <span className="hd-grade">{sc.grade}</span>
              {liveData
                ? <span style={{fontFamily:'var(--mono)',fontSize:'9px',color:'var(--g)',marginLeft:6}}> AI</span>
                : <span className="hd-delta">↑ +{sc.trend}pts vs FY24</span>
              }
            </div>
            <div className="hd-pctile">
              Top {100 - sc.percentile}% in sector · Sector avg {sc.sectorAvg} · Global avg {sc.globalAvg}
            </div>
          </div>

          <div className="vtog">
            <div className="vtog-lbl">Analysis Mode</div>
            <div className="vtog-btns">
              <button className={`vbtn${view === 'investor' ? ' on' : ''}`} onClick={() => setView('investor')}>
                 Investor
              </button>
              <button className={`vbtn${view === 'government' ? ' on' : ''}`} onClick={() => setView('government')}>
                 Government
              </button>
            </div>
            <div className="vtog-note">
              {view === 'investor'
                ? 'TCFD · GRI · ISSB · financial materiality'
                : 'BRSR · PAT Scheme · CDP · SDG alignment'}
            </div>
          </div>
        </div>

        {/* ── KPI CARDS ── */}
        <div className="kpi-row">
          {D.kpis.map(m => <KPI key={m.id} m={m} />)}
        </div>

        {/* ── SCORE BREAKDOWN + IMPACT ── */}
        <div className="main-grid">

          {/* Score breakdown */}
          <div className="card">
            <div className="ctit"><span className="cdot"/>CLIMACTIX SCORE BREAKDOWN</div>
            <div className="sbd-inner">
              <DonutChart score={sc.total} e={sc.e} s={sc.s} g={sc.g} />
              <div className="esg-bars">
                {esgBars.map(bar => (
                  <div key={bar.lbl}>
                    <div className="esg-bh">
                      <span className="esg-bn" style={{color:bar.color}}>{bar.lbl}</span>
                      <span>
                        <span className="esg-bv" style={{color:bar.color,fontFamily:'var(--mono)'}}>{bar.val}</span>
                        <span className="esg-bd">/100</span>
                      </span>
                    </div>
                    <div className="bar-t">
                      <div className="bar-f" style={{width:`${bar.val}%`,background:bar.color}}/>
                    </div>
                    <div className="esg-bwt">Weighting: {bar.wt}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="cmp-strip">
              {[
                {lbl:'This Company', val:sc.total,     color:'var(--g)'},
                {lbl:'Sector Avg',   val:sc.sectorAvg, color:'var(--y)'},
                {lbl:'Global Avg',   val:sc.globalAvg, color:'var(--t2)'},
              ].map(c => (
                <div key={c.lbl} className="cmp-box">
                  <div className="cmp-lbl">{c.lbl}</div>
                  <div className="cmp-val" style={{color:c.color,fontFamily:'var(--mono)'}}>{c.val}</div>
                  <div className="cmp-bar">
                    <div className="cmp-bf" style={{width:`${c.val}%`,background:c.color}}/>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Impact */}
          <div className="card">
            <div className="ctit"><span className="cdot"/>REAL-WORLD IMPACT CREATED</div>
            <div className="imp-grid">
              {D.impact.map((im, i) => (
                <div key={i} className="imp-box">
                  <div className="imp-ico">{im.ico}</div>
                  <div className="imp-val">{im.val}</div>
                  <div className="imp-unit">{im.unit}</div>
                  <div className="imp-lbl">
                    {im.lbl}<br/>
                    <span style={{color:'var(--t3)'}}>{im.sub}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* ── TREND CHARTS ── */}
        <div className="trend-row">
          <div className="card">
            <div className="ch-hd">
              <div>
                <div className="ctit"><span className="cdot"/>TOTAL EMISSIONS TREND (SCOPE 1+2)</div>
                <div className="ch-big" style={{color:'var(--g)'}}>48,200</div>
                <div className="ch-big-s">tCO₂e · Scope 1+2 · FY25</div>
              </div>
              <div>
                <div className="ch-delta" style={{color:'var(--g)'}}>↓ 17.5% reduction</div>
                <div className="ch-range">FY21 → FY25</div>
              </div>
            </div>
            <LineChart values={D.trends.em} labels={D.trends.lbl} color="#3A8FA8" unit=" tCO₂e" />
          </div>

          <div className="card">
            <div className="ch-hd">
              <div>
                <div className="ctit"><span className="cdot"/>RENEWABLE ENERGY ADOPTION TREND</div>
                <div className="ch-big" style={{color:'#3A8FA8'}}>34%</div>
                <div className="ch-big-s">of total energy mix · FY25</div>
              </div>
              <div>
                <div className="ch-delta" style={{color:'var(--g)'}}>↑ +20 pts growth</div>
                <div className="ch-range">FY21 → FY25</div>
              </div>
            </div>
            <LineChart values={D.trends.re} labels={D.trends.lbl} color="#3A8FA8" unit="%" />
          </div>
        </div>

        {/* ── INITIATIVES + RISKS ── */}
        <div className="bot-grid">

          {/* Initiatives */}
          <div className="card">
            <div className="ctit"><span className="cdot"/>ESG INITIATIVES TRACKER</div>
            <div className="init-hd">
              {['Initiative','Status','Impact & SDGs','Progress'].map(h => (
                <div key={h} className="ih-cell">{h}</div>
              ))}
            </div>
            {D.initiatives.map((d, i) => <InitRow key={i} d={d} />)}
          </div>

          {/* Risks */}
          <div className="card">
            <div className="ctit"><span className="cdot"/>RISK & OPPORTUNITY FLAGS</div>
            <div className="risk-2x2">
              {D.risks.map((r, i) => <RiskCard key={i} r={r} />)}
            </div>
          </div>
        </div>

        {/* ── VIEW-CONDITIONAL SECTION ── */}
        {view === 'investor' ? (
          <div className="card" style={{marginBottom:12}}>
            <div className="ctit"><span className="cdot"/>FRAMEWORK COMPLIANCE — INVESTOR VIEW</div>
            <p style={{fontSize:10.5,color:'var(--t3)',marginBottom:14,lineHeight:1.65}}>
              Alignment with major ESG and climate disclosure frameworks relevant to institutional investors, capital markets, and ESG index providers. Scores reflect management assessment as at {D.co.updated}.
            </p>
            <div className="cplist">
              {D.compliance.investor.map((c, i) => <CompRow key={i} c={c} />)}
            </div>
          </div>
        ) : (
          <div className="card" style={{marginBottom:12}}>
            <div className="ctit"><span className="cdot"/>SDG ALIGNMENT & REGULATORY COMPLIANCE — GOVERNMENT VIEW</div>
            <p style={{fontSize:10.5,color:'var(--t3)',marginBottom:14,lineHeight:1.65}}>
              Performance against UN Sustainable Development Goals and Indian regulatory frameworks. Score per SDG out of 100 based on material activity assessment.
            </p>
            <div className="sdg-8g" style={{marginBottom:20}}>
              {D.sdgs.map((s, i) => <SDGCard key={i} s={s} />)}
            </div>
            <div style={{borderTop:'1px solid var(--br)',paddingTop:16}}>
              <div className="ctit" style={{marginBottom:12}}>
                <span className="cdot"/>BRSR & REGULATORY FRAMEWORK COMPLIANCE
              </div>
              <div className="cplist">
                {D.compliance.government.map((c, i) => <CompRow key={i} c={c} />)}
              </div>
            </div>
          </div>
        )}

        {/* ── FOOTER ── */}
        <div className="dash-foot">
          <div className="foot-left">
            <img src="Climatix_logo.png" alt="Climactix Global" style={{height:'24px',width:'auto',objectFit:'contain',verticalAlign:'middle'}} />
            <span>Climate Intelligence Platform · Demo Dashboard · {D.co.fy}</span>
          </div>
          <div>For demonstration purposes only. Data is illustrative and not independently audited.</div>
        </div>

      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
