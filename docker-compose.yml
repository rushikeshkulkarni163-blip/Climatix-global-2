version: "3.9"

# ============================================================
# Climactix Global — Full-Stack Platform
# ============================================================
# Services:
#   - frontend        : Next.js 15 app (port 3000)
#   - intelligence    : FastAPI intelligence engine (port 8000)
#   - postgres        : PostgreSQL 16 + TimescaleDB (port 5432)
#   - redis           : Redis 7 cache (port 6379)
#   - neo4j           : Neo4j knowledge graph (port 7474/7687)
#   - kafka           : Kafka + Zookeeper for streaming (port 9092)
#   - grafana         : Observability dashboard (port 3001)
#   - prometheus      : Metrics collection (port 9090)
# ============================================================

services:

  # ── Frontend (Next.js) ──────────────────────────────────────
  frontend:
    build:
      context: ./climactix-global
      dockerfile: Dockerfile
      target: runner
    container_name: climactix-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://intelligence:8000
      - NEXT_PUBLIC_MAPBOX_TOKEN=${MAPBOX_TOKEN:-}
    depends_on:
      - intelligence
    networks:
      - climactix-net
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`climactix.global`)"

  # ── Intelligence Engine (FastAPI) ───────────────────────────
  intelligence:
    build:
      context: ./intelligence_engine
      dockerfile: Dockerfile
    container_name: climactix-intelligence
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://climactix:${DB_PASSWORD:-climactix}@postgres:5432/climactix
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-climactix}
      - KAFKA_BROKERS=kafka:9092
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-in-production}
      - WORKERS=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - climactix-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── PostgreSQL + TimescaleDB ────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: climactix-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=climactix
      - POSTGRES_PASSWORD=${DB_PASSWORD:-climactix}
      - POSTGRES_DB=climactix
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - climactix-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U climactix -d climactix"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: climactix-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - climactix-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j (ESG Knowledge Graph) ─────────────────────────────
  neo4j:
    image: neo4j:5-enterprise
    container_name: climactix-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-climactix}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - climactix-net
    restart: unless-stopped

  # ── Zookeeper ───────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: climactix-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - climactix-net
    restart: unless-stopped

  # ── Kafka (Climate Data Streaming) ──────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: climactix-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - climactix-net
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: climactix-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - climactix-net
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: climactix-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - climactix-net
    restart: unless-stopped

# ── Volumes ─────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  neo4j-data:
  neo4j-logs:
  prometheus-data:
  grafana-data:

# ── Networks ────────────────────────────────────────────────
networks:
  climactix-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
