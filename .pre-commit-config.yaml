repos:
  # ── Secret scanning (most important hook) ────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.1
    hooks:
      - id: gitleaks
        name: Detect secrets with Gitleaks
        stages: [pre-commit, pre-push]

  # ── Detect-secrets (second layer) ────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect hardcoded secrets
        args:
          - "--baseline"
          - ".secrets.baseline"
        exclude: package-lock\.json|\.env\.example|\.env\.prod\.example

  # ── General quality hooks ─────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=20000"]
        exclude: \.(mp4|webm|mov)$
      - id: check-merge-conflict
      - id: check-json
        exclude: .vscode/|tsconfig
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: end-of-file-fixer
        exclude: \.html$
      - id: trailing-whitespace
        exclude: \.html$|\.md$
      - id: no-commit-to-branch
        args: ["--branch", "production", "--branch", "release"]

  # ── Python security ───────────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        name: Bandit Python security scan
        args: ["-ll", "-ii"]
        files: ^backend/|^intelligence_engine/|^climactix-ai/|^climate_api/
        types: [python]
