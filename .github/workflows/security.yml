name: Security Scan

on:
  push:
    branches: [main, master, staging, production]
  pull_request:
    branches: [main, master, staging, production]
  schedule:
    # Run full scan every Monday at 06:00 UTC
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:

  # ── Job 1: Secret scanning ───────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for historical scan

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Job 2: Python security audit ────────────────────────────────────────────
  python-security:
    name: Python Security (Bandit + Safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install audit tools
        run: pip install bandit safety pip-audit

      - name: Bandit SAST scan
        run: |
          bandit -r backend/ intelligence_engine/ climactix-ai/ climate_api/ \
            --severity-level medium \
            --confidence-level medium \
            -f sarif -o bandit-results.sarif || true

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Safety dependency scan
        run: |
          pip install -r backend/requirements.txt 2>/dev/null || true
          safety check --full-report || true

  # ── Job 3: Node.js dependency audit ─────────────────────────────────────────
  node-audit:
    name: Node.js Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: climactix-global
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: climactix-global/package-lock.json

      - run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

  # ── Job 4: Docker image scan ─────────────────────────────────────────────────
  docker-scan:
    name: Docker Image Security (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image for scanning
        run: docker build -t climactix-backend:scan ./backend

      - name: Run Trivy on backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "climactix-backend:scan"
          format: "sarif"
          output: "trivy-backend.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

  # ── Job 5: OWASP Dependency-Check ───────────────────────────────────────────
  owasp-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "climactix-global"
          path: "."
          format: "SARIF"
          out: "dependency-check-report"
          args: >
            --failOnCVSS 8
            --enableRetired

      - name: Upload OWASP results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dependency-check-report/dependency-check-report.sarif
