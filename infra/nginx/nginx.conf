worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;

    upstream fastapi {
        server api:8000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name climactixglobal.com www.climactixglobal.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name climactixglobal.com www.climactixglobal.com;

        ssl_certificate     /etc/letsencrypt/live/climactixglobal.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/climactixglobal.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ── FastAPI backend routes ────────────────────────────────────────────
        location ~ ^/(api|health|admin|analyst|docs|openapi\.json)(/|$) {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # SSE streaming support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            chunked_transfer_encoding on;
        }

        # ── Static frontend files ─────────────────────────────────────────────
        location / {
            limit_req zone=general burst=50 nodelay;
            try_files $uri $uri.html $uri/ =404;

            # Cache static assets
            location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── Large file uploads ────────────────────────────────────────────────
        client_max_body_size 25M;
    }
}
