version: "3.9"

services:

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: climactix-api
    restart: unless-stopped
    env_file: ./backend/.env.prod
    volumes:
      - ./backend/knowledge:/app/knowledge
    networks:
      - climactix-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    container_name: climactix-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - climactix-net

networks:
  climactix-net:
    driver: bridge
